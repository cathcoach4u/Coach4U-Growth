<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — The Growth Hub</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Aptos', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #ffffff;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .box { max-width: 400px; width: 100%; }
    .logo { font-size: 28px; font-weight: 700; color: #003366; margin-bottom: 30px; text-align: center; }
    h1 { font-size: 24px; color: #003366; margin-bottom: 12px; text-align: center; font-weight: 600; }
    .subtitle { font-size: 15px; color: #666; text-align: center; margin-bottom: 24px; line-height: 1.5; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; color: #333; margin-bottom: 6px; font-weight: 500; }
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: inherit;
    }
    input:focus { outline: none; border-color: #003366; box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1); }
    .btn {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      font-weight: 600;
      background-color: #003366;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn:hover { background-color: #002244; }
    .btn:disabled { background-color: #999; cursor: not-allowed; }
    .alert { padding: 12px 14px; border-radius: 4px; font-size: 14px; margin-bottom: 16px; }
    .alert-error { background-color: #fdecea; border: 1px solid #f5c2c0; color: #8a1a14; }
    .alert-success { background-color: #f0f9f7; border: 1px solid #a3d5ce; color: #1a5f52; }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">
      <div class="logo">The Growth Hub</div>
      <h1>Set a new password</h1>
      <p class="subtitle">Choose a new password for your account.</p>

      <form id="reset-form">
        <div class="form-group">
          <label for="password">New password</label>
          <input type="password" id="password" required minlength="8" autocomplete="new-password" />
        </div>
        <div id="msg" class="alert" style="display:none"></div>
        <button type="submit" class="btn">Update Password</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL      = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Supabase appends the token as a hash fragment — the client picks it up automatically

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const msgEl    = document.getElementById('msg');
      const button   = e.target.querySelector('button');

      button.disabled = true;
      msgEl.style.display = 'none';

      const { error } = await supabase.auth.updateUser({ password });
      msgEl.style.display = 'block';
      if (error) {
        msgEl.className = 'alert alert-error';
        msgEl.textContent = error.message;
        button.disabled = false;
      } else {
        msgEl.className = 'alert alert-success';
        msgEl.textContent = 'Password updated! Redirecting to sign in…';
        setTimeout(() => window.location.href = 'login.html', 2000);
      }
    });
  </script>
</body>
</html>
