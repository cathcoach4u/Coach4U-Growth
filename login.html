<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Growth Hub — Login</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Growth Hub">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="images/logo.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Aptos', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #ffffff;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-box { max-width: 400px; width: 100%; }
    .logo { font-size: 28px; font-weight: 700; color: #003366; margin-bottom: 30px; text-align: center; }
    h1 { font-size: 28px; color: #003366; margin-bottom: 12px; text-align: center; font-weight: 600; }
    .subtitle { font-size: 16px; color: #666; text-align: center; margin-bottom: 30px; line-height: 1.5; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; color: #333; margin-bottom: 6px; font-weight: 500; }
    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: inherit;
      transition: border-color 0.3s;
    }
    input:focus { outline: none; border-color: #003366; box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1); }
    .btn {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      font-weight: 600;
      background-color: #003366;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      transition: background-color 0.3s;
    }
    .btn:hover { background-color: #002244; }
    .btn:disabled { background-color: #999; cursor: not-allowed; }
    .alert { padding: 12px 14px; border-radius: 4px; font-size: 14px; margin-bottom: 16px; }
    .alert-error { background-color: #fdecea; border: 1px solid #f5c2c0; color: #8a1a14; }
    .alert-success { background-color: #f0f9f7; border: 1px solid #a3d5ce; color: #1a5f52; }
    .forgot-link { text-align: center; margin-top: 14px; font-size: 0.875rem; }
    .forgot-link a { color: #0D9488; text-decoration: none; }
    .forgot-link a:hover { text-decoration: underline; }
    footer { background-color: #f5f5f5; padding: 20px; text-align: center; color: #999; font-size: 14px; border-top: 1px solid #eee; }
    footer a { color: #003366; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-box">
      <div class="logo">The Growth Hub</div>
      <h1>Sign in</h1>
      <p class="subtitle">Welcome back. Enter your email and password to continue.</p>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password" />
        </div>
        <div id="error-msg" class="alert alert-error" style="display:none"></div>
        <button type="submit" class="btn">Sign In</button>
        <p class="forgot-link"><a href="forgot-password.html">Forgot password?</a></p>
      </form>
    </div>
  </div>

  <footer>
    Strengths-Based Coaching and Counselling | <a href="https://coach4u.com.au" target="_blank">coach4u.com.au</a>
  </footer>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL      = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // If already logged in, jump to the gateway which routes by membership status
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.href = 'index.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('error-msg');
      const button   = e.target.querySelector('button');

      button.disabled = true;
      errEl.style.display = 'none';

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = error.message;
        errEl.style.display = 'block';
        button.disabled = false;
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
